# Lucius systemd drop-in override
# Deployed to: ~/.config/systemd/user/hermes-gateway.service.d/lucius-override.conf
#
# Hermes regenerates ~/.config/systemd/user/hermes-gateway.service every time
# `hermes gateway` runs (it owns the base unit template). That wipes any
# ExecStartPre we add to the base unit. Drop-ins are additive — they survive
# the regeneration — so the identity guard goes here.
#
# Also tightens the restart policy: Hermes ships Restart=always with
# StartLimitIntervalSec=0 (no burst limit), so a bot-token mishap would
# cycle the unit forever. We cap it at 5 restarts in 300s so heartbeat
# (T26) catches the `failed` state instead of seeing a perma-cycling unit.

[Service]
ExecStartPre=/home/brucewayne9/.lucius/scripts/lucius_identity_guard.sh

[Unit]
StartLimitIntervalSec=300
StartLimitBurst=5
